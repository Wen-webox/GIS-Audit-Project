name: Android APK Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼 (Checkout code)
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安裝系統依賴 (System Dependencies)
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev

      - name: 安裝 Buildozer 與必要套件
        run: |
          pip install --upgrade buildozer cython virtualenv
          export PATH=$PATH:~/.local/bin

      - name: 執行 Buildozer 打包 (這會花約 15-20 分鐘)
        run: |
          # 這裡會自動讀取您專案中的 buildozer.spec
          # 使用 --verbose 讓雲端 log 完整顯示，方便除錯
          yes | buildozer android debug

      - name: 儲存 APK 結果 (Upload Artifact)
        uses: actions/upload-artifact@v3
        with:
          name: GIS-Audit-APK
          path: bin/*.apk