name: Android APK Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝系統編譯依賴 (包含 libtool-bin 與 m4)
        run: |
          sudo apt update
          # 補齊所有編譯必需的 C 語言工具鏈與圖形庫
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool libtool-bin m4 pkg-config \
          zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libjpeg-dev libpng-dev

      - name: 安裝 Buildozer 與 Cython
        run: |
          pip install --upgrade buildozer "cython<3.0" virtualenv
          export PATH=$PATH:~/.local/bin

      - name: 執行 Buildozer 打包
        run: |
          yes | buildozer android debug

      - name: 儲存 APK 結果
        uses: actions/upload-artifact@v4
        with:
          name: GIS-Audit-APK
          path: bin/*.apk
