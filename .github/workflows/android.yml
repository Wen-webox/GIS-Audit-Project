name: Android APK Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 檢出程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 【最後的關鍵修復】強制綁定 Java 17，解決 Gradle 打包崩潰問題
      - name: 設定 Java 17 環境
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安裝系統編譯依賴 (移除衝突的舊 Java)
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf automake libtool pkg-config \
          zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libjpeg-dev libpng-dev

      - name: 安裝 Buildozer 與鎖定 Cython
        run: |
          pip install --upgrade buildozer "cython<3.0" virtualenv
          export PATH=$PATH:~/.local/bin

      - name: 執行 Buildozer 打包 (已經到最後一關了！)
        run: |
          yes | buildozer android debug

      - name: 儲存 APK 結果
        uses: actions/upload-artifact@v4
        with:
          name: GIS-Audit-APK
          path: bin/*.apk
